# Mago — PHP formatter + linter, the same toolchain the Tempest framework uses.
# Docs: https://mago.carthage.software
# Usage: `composer format`, `composer lint` (check), `composer style` (fix everything).
php-version = "8.5.0"

[source]
paths = ["src", "tests", "examples"]

[formatter]
# Formatting style mirrors Tempest's own mago.toml.
print-width = 180
tab-width = 4
use-tabs = false
space-after-logical-not-unary-prefix-operator = true
null-type-hint = "question"
space-before-arrow-function-parameter-list-parenthesis = true
preserve-breaking-member-access-chain = true
preserve-breaking-argument-list = true
preserve-breaking-array-like = true
preserve-breaking-parameter-list = true
preserve-breaking-attribute-list = true
preserve-breaking-conditional-expression = true
empty-line-after-opening-tag = false

[linter]
integrations = ["php-unit"]

# Rule set mirrors Tempest's own mago.toml, plus the FFI rules disabled because
# this library's entire premise IS PHP FFI -> md4c (the rules would fire on every line).
[linter.rules]
no-ffi = { enabled = false }
no-error-control-operator = { enabled = false }
# `empty()` is idiomatic in the throwaway bench/ scripts; not worth flagging here.
no-empty = { enabled = false }
literal-named-argument = { enabled = false }
too-many-methods = { enabled = false }
kan-defect = { enabled = false }
cyclomatic-complexity = { enabled = false }
too-many-enum-cases = { enabled = false }
no-redundant-file = { enabled = false }
assertion-style = { style = "this" }
strict-assertions = { enabled = false }
no-else-clause = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
no-shorthand-ternary = { enabled = false }
no-assign-in-condition = { enabled = false }
strict-types = { enabled = false }
tagged-todo = { enabled = false }
excessive-parameter-list = { enabled = false }
halstead = { enabled = false }
prefer-arrow-function = { enabled = false }
prefer-first-class-callable = { enabled = false }
strict-behavior = { allow-loose-behavior = true }

# Auto-import global symbols instead of leaving them fully-qualified (\strlen, \PHP_EOL, ...).
# These are off by default; `mago lint --fix` rewrites \foo() -> `use function foo;` + foo().
# Only acts on namespaced files (global symbols in non-namespaced files have a resolution fallback).
no-fully-qualified-global-function = { enabled = true }
no-fully-qualified-global-constant = { enabled = true }
no-fully-qualified-global-class-like = { enabled = true }
